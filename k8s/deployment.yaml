apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-deployment
  labels:
    app: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-app
        image: meine-test-app:latest
        imagePullPolicy: Never # Wichtig, da wir das Image lokal in KinD laden!
        ports:
        - containerPort: 8000